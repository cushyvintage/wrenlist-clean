<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrenlist — Marketplace Sync</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      min-height: 200px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f3f0;
      color: #2d3025;
    }
    
    .header {
      background: linear-gradient(135deg, #7a8471 0%, #6b7562 100%);
      color: #f5f3f0;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .content {
      padding: 16px;
    }
    
    .status {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #9ba088;
    }
    
    .status-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: #2d3025;
    }
    
    .status-text {
      font-size: 12px;
      color: #4a5142;
    }
    
    .button {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #7a8471 0%, #6b7562 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .button:hover {
      background: #5d6355;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(122, 132, 113, 0.3);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #6a6b6a;
      border-top: 1px solid #ede9e4;
    }
    
    .error {
      background: #fee;
      border-color: #fcc;
      color: #c33;
    }
    
    .success {
      background: #efe;
      border-color: #cfc;
      color: #3c3;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .stat-item {
      background: white;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      border: 1px solid #ede9e4;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #7a8471;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 11px;
      color: #6a6b6a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .recent-imports {
      margin-bottom: 12px;
    }
    
    .section-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 8px;
      color: #2d3025;
    }
    
    .import-list {
      max-height: 200px;
      overflow-y: auto;
      background: white;
      border-radius: 8px;
      border: 1px solid #ede9e4;
    }
    
    .import-item {
      padding: 10px 12px;
      border-bottom: 1px solid #ede9e4;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .import-item:last-child {
      border-bottom: none;
    }
    
    .import-item.success {
      border-left: 3px solid #10b981;
    }
    
    .import-item.error {
      border-left: 3px solid #ef4444;
    }
    
    .import-title {
      font-weight: 500;
      color: #2d3025;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 8px;
    }
    
    .import-meta {
      font-size: 10px;
      color: #6a6b6a;
      text-align: right;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
    }
    
    .button.secondary {
      background: white;
      color: #7a8471;
      border: 1px solid #9ba088;
    }
    
    .button.secondary:hover {
      background: #f5f3f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Wrenlist — Marketplace Sync</h1>
    <p>Multi-marketplace integration</p>
  </div>
  
  <div class="content">
    <div class="status" id="status">
      <div class="status-title">Status</div>
      <div class="status-text" id="statusText">Ready to import products</div>
    </div>
    
    <div class="stats" id="stats" style="display: none;">
      <div class="stat-item">
        <div class="stat-value" id="totalImports">0</div>
        <div class="stat-label">Total Imports</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="successRate">0%</div>
        <div class="stat-label">Success Rate</div>
      </div>
    </div>
    
    <div class="recent-imports" id="recentImports" style="display: none;">
      <div class="section-title">Recent Imports</div>
      <div class="import-list" id="importList"></div>
    </div>
    
    <div class="button-group">
      <button class="button" id="openWrenlist">Open Wrenlist</button>
      <button class="button secondary" id="openSettings">Settings</button>
    </div>
  </div>
  
      <div class="footer">
        Version 1.1.0
      </div>
  
  <script src="popup.js"></script>
</body>
</html>
